{% extends 'salon/base.html' %}
{% block content %}

<h1>Servicios</h1>

<a href="{% url 'salon:servicio_create' %}"
class="btn btn-primary mb-3">

Nuevo Servicio

</a>

<table class="table table-bordered">

    <thead>

        <tr>

            <th>Nombre</th>
            <th>Precio</th>
            <th>Duración</th>
            <th>Acciones</th>

        </tr>

    </thead>

    <tbody>

        {% for servicio in servicios %}

        <tr>

            <td>{{ servicio.nombre }}</td>
            <td>${{ servicio.precio }}</td>
            <td>{{ servicio.duracion }} min</td>

            <td>

                <a href="{% url 'salon:servicio_update' servicio.id %}"
                class="btn btn-warning">

                Editar

                </a>

                <a href="{% url 'salon:servicio_delete' servicio.id %}"
                class="btn btn-danger">

                Eliminar

                </a>

            </td>

        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
