{% extends 'salon/base.html' %}
{% block content %}

<h1>Clientes</h1>

<a href="{% url 'salon:cliente_create' %}"
class="btn btn-primary mb-3">

Nuevo Cliente
</a>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>Nombre</th>
            <th>Teléfono</th>
            <th>Email</th>
            <th>Acciones</th>
        </tr>
    </thead>

    <tbody>

        {% for cliente in clientes %}

        <tr>
            <td>{{ cliente.nombre }}</td>
            <td>{{ cliente.telefono }}</td>
            <td>{{ cliente.email }}</td>
            <td>

                <a href="{% url 'salon:cliente_update' cliente.id %}"
                class="btn btn-warning">

                Editar

                </a>
                <a href="{% url 'salon:cliente_delete' cliente.id %}"
                class="btn btn-danger">

                Eliminar

                </a>
            </td>
        </tr>

        {% endfor %}

    </tbody>
</table>

{% endblock %}
