{% extends 'salon/base.html' %}
{% block content %}

<h1>Citas</h1>

<a href="{% url 'salon:cita_create' %}"
class="btn btn-primary mb-3">

Nueva Cita

</a>

<table class="table table-hover table-bordered">

    <thead class="table-dark">

        <tr>
            <th>Cliente</th>
            <th>Servicio</th>
            <th>Fecha</th>
            <th>Hora</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>

    </thead>

    <tbody>
        {% for cita in citas %}
        <tr>

            <td>{{ cita.cliente }}</td>

            <td>{{ cita.servicio }}</td>

            <td>{{ cita.fecha }}</td>

            <td>{{ cita.hora }}</td>

            <td>{{ cita.estado }}</td>

            <td>

                <a href="{% url 'salon:cita_update' cita.id %}"
                class="btn btn-warning btn-sm">

                    Editar

                </a>

                <a href="{% url 'salon:cita_delete' cita.id %}"
                class="btn btn-danger btn-sm">

                    Eliminar

                </a>
            </td>
        </tr>

        {% endfor %}

    </tbody>

</table>
{% endblock %}
